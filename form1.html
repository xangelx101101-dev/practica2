<html>
<link rel="stylesheet" href="css/estilo1.css">

<div class="div">

<form name="trabajador">

	<table width="40%" border="0">
		<tr>
			<td>Nombre </td>
			<td><input type="text" 
				   placeholder="Nombre del alumno"></td>
		</tr>

		<tr>
			<td>Apellido </td>
			<td><input type="text"
				 placeholder="Apellidos del alumno"></td>
		</tr>

		<tr>
			<td>Edad </td>
			<td><input type="text"></td>
		</tr>

		<tr>
			<td>Telefono </td>
			<td><input type="text"></td>
		</tr>

		<tr>
			<td>Genero </td>
			<td>
				<select>
					<option> Seleccionar </option>
					<option> Masculino </option>
					<option> Femenino </option>
				</select>
			</td>
		</tr>
		<tr>
			<td>Departamento </td>
			<td>
				<select>
					<option> Seleccionar </option>
					<option> Ayacucho </option>
					<option> Apurimac </option>
					<option> Arequipa </option>
					<option> Ica </option>
					<option> Lima</option>
				</select>
			</td>
		</tr>
		<tr>
			<td> Sueldo Basico </td>
			<td> <input type="number" value="1500"></td>
		</tr>
		<tr>
			<td> Cargo </td>
			<td> 
				<input type="radio" name="a">Administrador
				<input type="radio" name="a">Contrador
				<input type="radio" name="a">Empleado
			</td>
		</tr>
		<tr>
			<td> Utiles de escritorio </td>
			<td> 
				<input type="checkbox">Oficina
				<input type="checkbox" >Mueble
				<input type="checkbox" >Utiles
			</td>
		</tr>
		<tr>
			<td> 
				<input type="button" value="Guardar">
				<input type="reset" value="Limpiar">
			</td>
		</tr>
	</table>

</form>
</div>
</html>
